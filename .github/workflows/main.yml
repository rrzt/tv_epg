name: 自动同步原仓库更新
on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟检查一次
    - cron: '0 0 * * *'     # 北京时间 8:00
    - cron: '0 10 * * *'    # 北京时间 18:00
  workflow_dispatch:        # 支持手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      # 1. 克隆仓库（核心：fetch-depth=0 必须保留）
      - name: 克隆仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # 若分支是main，替换成main
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      # 2. 配置Git身份（必须保留）
      - name: 配置Git用户
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      # 3. 设置上游仓库（修正fetch语法错误）
      - name: 设置上游仓库
        run: |
          git remote remove upstream || echo "upstream不存在，跳过删除"
          # 替换成你要同步的原仓库地址！！！
          git remote add upstream https://github.com/taksssss/tv.git
          # 正确语法：拉取upstream并清理过时分支
          git fetch upstream --prune
      # 4. 合并上游更新
      - name: 合并上游更新
        run: |
          git checkout main || git checkout -b main  # 分支名同步修改
          git pull origin main --no-edit
          if git merge upstream/main --no-edit; then
            echo "合并成功"
          else
            echo "合并冲突，终止任务"
            git merge --abort
            exit 1
          fi
      # 5. 推送更新（重试机制）
      - name: 推送更新到仓库
        run: |
          for i in {1..3}; do
            git push origin main && break
            echo "推送失败，第$i次重试..."
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
