name: 自动同步原仓库更新
on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟一次
    - cron: '0 8 * * *'     # 北京时间16:00
    - cron: '0 18 * * *'    # 北京时间凌晨2点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3      # 强制3分钟超时，防止卡死
    steps:
      - name: 克隆仓库（超快）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1     # 只拉最新代码（关键！）
          ref: main

      - name: 配置Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 拉取原仓库更新
        run: |
          git remote add upstream https://github.com/taksssss/tv.git
          git fetch upstream main --depth 1

      - name: 合并并推送
        run: |
          git merge upstream/main --no-edit || exit 0
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
